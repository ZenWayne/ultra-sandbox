name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sandbox-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: sandbox-linux-x86_64-static
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sandbox-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sandbox-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact }})

    defaults:
      run:
        working-directory: ultra-sandbox/sandbox-rs

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ultra-sandbox/sandbox-rs -> target

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for upload
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/sandbox"
          [ -f "${src}.exe" ] && src="${src}.exe"
          cp "$src" "../${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ultra-sandbox/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
